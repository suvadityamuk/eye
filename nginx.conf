server {
    listen ${PORT} default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # CORS for 3D assets
    add_header Access-Control-Allow-Origin *;

    # MIME types for 3D formats
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json gltf;
        application/octet-stream              glb splat spz sog bin fbx 3dm;
        application/wasm                      wasm;
        model/stl                             stl;
        model/obj                             obj;
        model/mtl                             mtl;
        application/x-ply                     ply;
        chemical/x-pdb                        pdb;
        model/vnd.usdz+zip                    usdz;
        model/vnd.usd                          usd usda usdc;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        image/svg+xml                         svg;
        font/woff2                            woff2;
        font/woff                             woff;
    }

    # HTML — always revalidate (prevents stale index.html behind CDN)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    # Versioned static assets — cache aggressively (busted by ?v= param)
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|woff2|woff)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }
}
